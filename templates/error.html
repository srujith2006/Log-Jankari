{% extends "base.html" %}

{% block title %}Error - Survivor Detection System{% endblock %}

{% block extra_css %}
<style>
    .error-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 200px);
    }
    
    .error-box {
        background: white;
        border-radius: 10px;
        padding: 3rem 2rem;
        max-width: 500px;
        text-align: center;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }
    
    .error-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
    }
    
    .error-title {
        font-size: 1.8rem;
        color: #333;
        margin-bottom: 1rem;
        font-weight: bold;
    }
    
    .error-message {
        color: #666;
        font-size: 1.1rem;
        margin-bottom: 2rem;
        line-height: 1.6;
    }
    
    .btn {
        display: inline-block;
        padding: 0.75rem 2rem;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
    }
    
    .btn-primary {
        background: #667eea;
        color: white;
    }
    
    .btn-primary:hover {
        background: #5568d3;
        transform: translateY(-2px);
    }
    
    .btn-secondary {
        background: #e9ecef;
        color: #333;
        margin-left: 1rem;
    }
    
    .btn-secondary:hover {
        background: #dee2e6;
    }
</style>
{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-box">
        <div class="error-icon">⚠️</div>
        <h1 class="error-title">Oops! Something went wrong</h1>
        <p class="error-message">{{ message or 'An unexpected error occurred.' }}</p>
        
        <div>
            <a href="{{ url_for('home') }}" class="btn btn-primary">🏠 Back to Home</a>
            <a href="javascript:history.back()" class="btn btn-secondary">← Go Back</a>
        </div>
    </div>
</div>
{% endblock %}
